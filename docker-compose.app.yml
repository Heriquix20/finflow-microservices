services:
  zookeeper:
    image: finflow-zookeeper:7.7.8
    build:
      context: ./docker/infra/zookeeper
      dockerfile: Dockerfile
    container_name: finflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/2181'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - finflow-network

  kafka:
    image: finflow-kafka:7.7.8
    build:
      context: ./docker/infra/kafka
      dockerfile: Dockerfile
    container_name: finflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - finflow-network

  mongo:
    image: finflow-mongo:7.0
    build:
      context: ./docker/infra/mongo
      dockerfile: Dockerfile
    container_name: finflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - finflow-network

  finflow-discovery:
    image: finflow-discovery:local
    build:
      context: .
      dockerfile: finflow-discovery/Dockerfile
    container_name: finflow-discovery
    environment:
      SERVER_PORT: 8761
    ports:
      - "8761:8761"
    networks:
      - finflow-network

  finflow-gateway:
    image: finflow-gateway:local
    build:
      context: .
      dockerfile: finflow-gateway/Dockerfile
    container_name: finflow-gateway
    depends_on:
      - finflow-discovery
      - finflow-auth
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://finflow-discovery:8761/eureka
      JWT_SECRET: minha-chave-super-secreta-minha-chave-super-secreta
    ports:
      - "8080:8080"
    networks:
      - finflow-network

  finflow-auth:
    image: finflow-auth:local
    build:
      context: .
      dockerfile: finflow-auth/Dockerfile
    container_name: finflow-auth
    depends_on:
      - finflow-discovery
      - mongo
    environment:
      SERVER_PORT: 8084
      EUREKA_DEFAULT_ZONE: http://finflow-discovery:8761/eureka
      MONGODB_URI: mongodb://mongo:27017/finflow_auth
      JWT_SECRET: minha-chave-super-secreta-minha-chave-super-secreta
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8084:8084"
    networks:
      - finflow-network

  finflow-income:
    image: finflow-income:local
    build:
      context: .
      dockerfile: finflow-income/Dockerfile
    container_name: finflow-income
    depends_on:
      - finflow-discovery
      - mongo
      - kafka
    environment:
      SERVER_PORT: 8081
      EUREKA_DEFAULT_ZONE: http://finflow-discovery:8761/eureka
      MONGODB_URI: mongodb://mongo:27017/finflow_income
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8081:8081"
    networks:
      - finflow-network

  finflow-expense:
    image: finflow-expense:local
    build:
      context: .
      dockerfile: finflow-expense/Dockerfile
    container_name: finflow-expense
    depends_on:
      - finflow-discovery
      - mongo
      - kafka
    environment:
      SERVER_PORT: 8082
      EUREKA_DEFAULT_ZONE: http://finflow-discovery:8761/eureka
      MONGODB_URI: mongodb://mongo:27017/finflow_expense
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8082:8082"
    networks:
      - finflow-network

  finflow-reports:
    image: finflow-reports:local
    build:
      context: .
      dockerfile: finflow-reports/Dockerfile
    container_name: finflow-reports
    depends_on:
      - finflow-discovery
      - mongo
      - kafka
      - finflow-income
      - finflow-expense
    environment:
      SERVER_PORT: 8083
      EUREKA_DEFAULT_ZONE: http://finflow-discovery:8761/eureka
      MONGODB_URI: mongodb://mongo:27017/finflow_reports
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      FINFLOW_INCOME_SERVICE_URL: http://finflow-income:8081
      FINFLOW_EXPENSE_SERVICE_URL: http://finflow-expense:8082
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8083:8083"
    networks:
      - finflow-network

volumes:
  mongo-data:

networks:
  finflow-network:
    driver: bridge
