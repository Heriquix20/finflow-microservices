spring:
  application:
    name: finflow-reports
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/finflow_reports}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_REPORTS_GROUP_ID:finflow-reports-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${SERVER_PORT:8083}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

finflow:
  services:
    income:
      url: ${FINFLOW_INCOME_SERVICE_URL:http://localhost:8081}
    expense:
      url: ${FINFLOW_EXPENSE_SERVICE_URL:http://localhost:8082}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080}
