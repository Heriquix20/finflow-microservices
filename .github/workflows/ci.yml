name: FinFlow CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'codex/**'
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend
        run: mvn -B verify
